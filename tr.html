<style>
  :root{
    --emerald:#059669;
    --emerald-dark:#065F46;
    --emerald-deep:#04412F;
    --emerald-soft:#ECFDF5;
    --emerald-line:#C9EEDD;
    --accent:#047857;
    --ink:#14201B;
    --ink-soft:#3C463F;
    --muted:#6B746E;
    --line:#E3E8E5;
    --bg:#E9EDEA;
    --side-ink:#E9FBF2;
    --side-muted:#A9D9C5;
    --shadow:0 1px 2px rgba(6,60,40,.05), 0 4px 12px rgba(6,60,40,.06);
    /* ---- Tiklama (click) ikonlari ---- */
    --clickicon-size:25px;        /* TEK degisken: tum click ikonlarinin boyutu */
    --clickicon-offset-x:5px;     /* TUM click ikonlarini yatayda kaydirir (+ = saga) */
    --clickicon-offset-y:5px;     /* TUM click ikonlarini dikeyde kaydirir (+ = asagi) */

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,Segoe UI,Roboto,Arial,sans-serif;
    font-size:12.5px; line-height:1.5;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .page{
    width:210mm; min-height:297mm; margin:14px auto; background:#fff;
    box-shadow:0 8px 40px rgba(6,60,40,.16);
    display:block; padding-right:26px; padding-bottom:28px;
  }
  h1,h2,h3,h4{font-family:'Manrope',sans-serif; margin:0; letter-spacing:-.01em;}
  a{color:inherit; text-decoration:none;}

  /* ===== Sidebar ===== */
  .side{
    float:left; width:64mm;
    background:linear-gradient(180deg,var(--emerald-dark) 0%, var(--emerald-deep) 100%);
    color:var(--side-ink); padding:24px 18px 26px;
    margin-right:26px; margin-bottom:26px;
  }
  .side .photo, .side .photo-fallback{
    width:118px; height:118px; border-radius:14px; object-fit:cover; display:block;
    margin:0 auto 14px; border:3px solid rgba(255,255,255,.45);
    box-shadow:0 6px 18px rgba(0,30,18,.4); background:#fff;
  }
  .side .photo-fallback{display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.14); font-family:'Manrope'; font-weight:800; font-size:42px; color:#fff;}
  .side-name{font-size:20px; font-weight:800; text-align:center; color:#fff; line-height:1.12;}
  .side-title{font-size:11.5px; font-weight:600; text-align:center; margin-top:6px; color:#9FE7CB;}
  .side-sub{font-size:10px; text-align:center; margin-top:5px; color:var(--side-muted); line-height:1.45;}

  .side h3{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
    color:#7FD9B6; margin:18px 0 9px; padding-bottom:6px;
    border-bottom:1px solid rgba(255,255,255,.16);
  }
  /* sidebar contact */
  .scontact{display:flex; flex-direction:column; gap:7px; position:relative;}
  .sbtn{
    position:relative; display:flex; align-items:center; gap:9px;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
    border-radius:8px; padding:7px 9px; color:#fff;
  }
  .sbtn img{width:15px; height:15px; flex:0 0 auto; filter:brightness(0) invert(1);}
  .sbtn .tx{min-width:0;}
  .sbtn .tx b{display:block; font-size:9px; font-weight:600; color:#8FDFC0; text-transform:uppercase; letter-spacing:.05em;}
  .sbtn .tx span{display:block; font-size:10.5px; font-weight:500; color:#EAFBF3; word-break:break-all;}
  .sbtn .dot{width:7px; height:7px; border-radius:2px; background:#34D399; flex:0 0 auto;}

  /* sidebar skills */
  .sgroup{margin-bottom:13px;}
  .sgroup h4{font-size:10.5px; font-weight:700; color:#CFF3E3; margin-bottom:6px;}
  .schips{display:flex; flex-wrap:wrap; gap:5px; position:relative;}
  .schip{font-size:9.7px; font-weight:500; color:var(--side-ink); background:rgba(255,255,255,.09);
    border:1px solid rgba(255,255,255,.15); border-radius:6px; padding:3px 7px;}
  .schip.link{position:relative; color:#063; background:#A7F3D0; border:1px solid #6EE7B7; font-weight:700;
    display:inline-flex; align-items:center; gap:5px;}
  .schip.link img{height:11px; width:auto;}

  .ssys{display:flex; flex-direction:column; gap:5px; position:relative;}
  .ssys .it{font-size:10px; color:var(--side-ink); background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14); border-radius:6px; padding:5px 8px;
    display:flex; align-items:center; gap:7px;}
  .ssys .it::before{content:""; width:6px; height:6px; border-radius:2px; background:#5EE0A8; flex:0 0 auto;}
  .ssys a.it{position:relative; color:#053; background:#A7F3D0; border:1px solid #6EE7B7; font-weight:700;}
  .ssys a.it::before{background:#047857;}
  .ssys a.it img{height:12px; margin-left:auto; width:auto;}

  .side-edu{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); border-radius:9px; padding:11px;}
  .side-edu .deg{font-size:11px; font-weight:700; color:#fff; line-height:1.3;}
  .side-edu .ln{font-size:9.7px; color:var(--side-muted); margin-top:4px; line-height:1.4;}
  .side-edu .mt{display:flex; gap:6px; flex-wrap:wrap; margin-top:7px;}
  .side-edu .mt span{font-size:9px; font-weight:600; color:#063; background:#A7F3D0; border-radius:5px; padding:2px 7px;}
  .side-lang{display:flex; gap:7px; margin-top:9px;}
  .side-lang .l{flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); border-radius:7px; padding:6px 8px;}
  .side-lang .l b{display:block; font-size:10.5px; color:#fff; font-family:'Manrope'; font-weight:700;}
  .side-lang .l span{font-size:9px; color:var(--side-muted);}

  .summary{font-size:12px; color:var(--ink-soft); line-height:1.6;}

  .card + .card{margin-top:11px;}
  .feat{border-left:4px solid var(--emerald); background:var(--emerald-soft);}
  .exp-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
  .feat-badge{display:inline-block; font-size:8.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;

  .exp-name{font-size:15px; font-weight:800; color:var(--ink);}
  .exp-role{font-size:11px; font-weight:600; color:var(--accent); margin-top:3px;}
  .exp-dates{font-size:10px; font-weight:700; color:var(--muted); white-space:nowrap; text-align:right;}
  .exp-note{font-size:9.5px; color:var(--muted); margin-top:2px; text-align:right;}
  .exp-oneline{font-size:11.5px; color:var(--ink-soft); margin-top:8px; line-height:1.55;}

  ul.bullets li{position:relative; padding-left:16px; font-size:11px; color:var(--ink-soft); margin-bottom:5px; line-height:1.5;}
  ul.bullets li::before{content:""; position:absolute; left:1px; top:6px; width:7px; height:7px;
    border:2px solid var(--emerald); border-radius:50%;}

  .btn-row{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; position:relative;}
  .store-badge{position:relative; display:inline-block;}
  .store-badge img{height:38px; display:block;}
  .lbtn{position:relative; display:inline-flex; align-items:center; gap:6px; background:#fff;
    border:1px solid var(--emerald-line); color:var(--accent); border-radius:7px; padding:5px 10px;
    font-size:10.5px; font-weight:600;}
  .lbtn img{height:14px; width:auto; display:block;}

     gozukmedigi icin acik bir steam-mavisi zemin secildi. */
  .lbtn.steam{background:#e8f1fb; border-color:#c4d8ee; color:#1b3a5b;}
  .lbtn.steam img{height:15px;}

  /* width/height !important: kapsayici buton img kurallari (.sbtn img, .store-badge img,
     .lbtn img ...) ezmesin diye - boylece TUM click ikonlari tek --clickicon-size'dan gelir.
     Konum: global --clickicon-offset-x/y (hepsini birden kaydirir) + her ikonun kendi
     --clickicon-dx/dy degeri (sadece o ikonu kaydirir, normalde 0). */
  .clickicon{position:absolute; right:0; bottom:0;
    width:var(--clickicon-size) !important; height:var(--clickicon-size) !important;
    transform:translate(
      calc(7px + var(--clickicon-offset-x) + var(--clickicon-dx,0px)),
      calc(7px + var(--clickicon-offset-y) + var(--clickicon-dy,0px)));
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.3)); pointer-events:none;}

  .proj-img-multi{display:flex; width:100%; height:96px; background:#eef2f0; border-bottom:1px solid var(--line);}
  .proj-img-multi img{flex:1; min-width:0; object-fit:cover; border-right:1px solid var(--line);}
  .proj-img-multi img:last-child{border-right:none;}
  .proj-body{padding:10px 11px 11px; display:flex; flex-direction:column; flex:1;}
  .proj-name{font-size:12.5px; font-weight:800; color:var(--ink);}
  .proj-kind{font-size:9.5px; font-weight:600; color:var(--accent); margin-top:2px;}
  .proj-tags{display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;}
  .tag{font-size:8.5px; font-weight:600; color:var(--emerald-dark); background:var(--emerald-soft);
    border:1px solid var(--emerald-line); border-radius:5px; padding:2px 6px;}
  .proj-desc{font-size:10px; color:var(--ink-soft); line-height:1.48; margin-top:7px; flex:1;}
  .proj .btn-row{margin-top:9px; gap:5px;}
  .proj .lbtn{padding:4px 8px; font-size:9.3px;}
  .proj .lbtn img{height:12px;}

  .footnote{grid-column:1 / -1; display:flex; align-items:center; flex-wrap:wrap; gap:9px;
    font-size:10.5px; color:var(--ink-soft); background:var(--emerald-soft);
    border:1px dashed var(--emerald-line); border-radius:9px; padding:9px 12px;}
  .footnote .btn-row{margin-top:0;}

  .str-wrap{display:flex; flex-wrap:wrap; gap:6px;}
  .str{font-size:10px; font-weight:600; color:var(--emerald-dark); background:var(--emerald-soft);
    border:1px solid var(--emerald-line); border-radius:6px; padding:4px 9px;}
  .kp{margin:9px 0 0; padding:0; display:flex; flex-direction:column; gap:5px;}
  .kp li{position:relative; padding-left:18px; font-size:11px; color:var(--ink-soft); list-style:none; line-height:1.45;}
  .kp li::before{content:"✓"; position:absolute; left:2px; top:0; color:var(--emerald); font-weight:800; font-size:11px;}
  .cols2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .mini-h{font-size:10.5px; font-weight:700; color:var(--ink); margin-bottom:7px; text-transform:uppercase; letter-spacing:.04em;}

  @page{size:A4; margin:0;}
  @media print{
    body{background:#fff;}
    .page{margin:0; box-shadow:none; width:auto; min-height:auto;}
    .card,.proj{box-shadow:none;}
  }
</style>
</head>

/* ---------- render helpers ---------- */
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/&lt;b&gt;/g, "<b>").replace(/&lt;\/b&gt;/g, "</b>");

/* ---------- click (tiklama) ikonlari ----------
   Boyut: :root --clickicon-size (TEK degisken, hepsi icin gecerli).
   Konum:
     - HEPSINI birden kaydirmak icin: :root --clickicon-offset-x / --clickicon-offset-y
     - SADECE bir ikonu kaydirmak icin: asagidaki ilgili anahtarin x/y'si (normalde 0,0). */
const CLICK_OFFSETS = {
  contact:       { x:0, y:0 },   // sidebar - iletisim
  stores:        { x:0, y:0 },   // CulturEnglish - magaza rozetleri
  simpleBalance: { x:0, y:0 },   // The Simple Balance - View on Steam
  footnote:      { x:0, y:0 },   // projeler dipnotu
  skills:        { x:0, y:0 },   // sidebar - yetenekler
  systems:       { x:0, y:0 },   // sidebar - sistemler
  "proj-0":{x:0,y:0}, "proj-1":{x:0,y:0}, "proj-2":{x:0,y:0}, "proj-3":{x:0,y:0},
  "proj-4":{x:0,y:0}, "proj-5":{x:0,y:0}, "proj-6":{x:0,y:0}, "proj-7":{x:0,y:0}
};
function clickIcon(key){
  const o = CLICK_OFFSETS[key] || { x:0, y:0 };
  return `<img class="clickicon" style="--clickicon-dx:${o.x}px; --clickicon-dy:${o.y}px" src="${DATA.clickIcon}" alt="">`;
}

function linkBtn(l, isLast, key){
  const badge = BADGE_BY_TYPE[l.type] || BADGE_BY_TYPE.web;
  const isSteam = l.type === "steam";
  const steam = isSteam ? " steam" : "";
  // Steam'de: "View On [STEAM svg]" - once yazi, sonra steam logosu.
  const inner = isSteam
    ? `<span>${esc(l.label)}</span><img src="${badge}" alt="Steam">`
    : `<img src="${badge}" alt=""><span>${esc(l.label)}</span>`;
  return `<a class="lbtn${steam}" href="${l.href}" target="_blank" rel="noopener">`
    + inner + (isLast ? clickIcon(key) : "") + `</a>`;
}

function render(){
  const d = DATA;

  /* ===== SIDEBAR ===== */
  const photo = d.photo
    ? `<img class="photo" src="${d.photo}" alt="${esc(d.name)}">`
    : `<div class="photo-fallback">${esc(d.initials)}</div>`;

  const contact = d.contact.map((c,i)=>{
    const last = i === d.contact.length-1;
    const ic = c.badge ? `<img src="${c.badge}" alt="">` : (c.emoji ? `<span style="font-size:12px; line-height:1; flex:0 0 auto;">${c.emoji}</span>` : `<span class="dot"></span>`);
    return `<a class="sbtn" href="${c.href}" target="_blank" rel="noopener">${ic}`
      + `<span class="tx"><b>${esc(c.label)}</b><span>${esc(c.value)}</span></span>`
      + (last ? clickIcon('contact') : "") + `</a>`;
  }).join("");

  /* sidebar skills (chips). Track last clickable for click icon */
  const skillGroups = d.skills.map(g=>{
    const items = g.items.map(it=>{
      if(it.href){
        return `<a class="schip link" href="${it.href}" target="_blank" rel="noopener"><img src="${BADGE_BY_TYPE.github}" alt="">${esc(it.label)}</a>`;
      }
      return `<span class="schip">${esc(it.label)}</span>`;
    }).join("");
    return `<div class="sgroup"><h4>${esc(g.group)}</h4><div class="schips">${items}</div></div>`;
  }).join("");

  const sysItems = d.systems.map(s=>{
    if(s.href){
      return `<a class="it" href="${s.href}" target="_blank" rel="noopener"><span>${esc(s.label)}</span><img src="${BADGE_BY_TYPE.github}" alt=""></a>`;
    }
    return `<div class="it">${esc(s.label)}</div>`;
  }).join("");

  const e = d.education;
  const eduHtml = `
    <div class="side-edu">
      <div class="deg">${esc(e.degree)}</div>
      <div class="ln">${esc(e.faculty)} · ${esc(e.school)}</div>
      <div class="mt"><span>${esc(e.dates)}</span><span>${esc(e.gpa)}</span></div>
    </div>
    <div class="side-lang">${d.languages.map(l=>`<div class="l"><b>${esc(l.name)}</b><span>${esc(l.level)}</span></div>`).join("")}</div>`;

  const sideStr = d.strengths.map(s=>`<span class="schip">${esc(s)}</span>`).join("");
  const sideKp = d.keyPoints.map(k=>`<li>${esc(k)}</li>`).join("");

  document.getElementById("side").innerHTML = `
    ${photo}
    <div class="side-name">${esc(d.name)}</div>
    <div class="side-title">${esc(d.title)}</div>
    <div class="side-sub">${esc(d.subtitle)}</div>

    <h3>Bağlantılar</h3>
    <div class="scontact">${contact}</div>

    <h3>Yetenekler</h3>
    ${skillGroups}

    <h3>Tasarladığım Sistemler</h3>
    <div class="ssys">${sysItems}</div>

    <h3>Temel Güçlü Yönler</h3>
    <div class="schips">${sideStr}</div>

    <h3>Önemli Noktalar</h3>
    <ul class="side-kp">${sideKp}</ul>

    <h3>Eğitim ve Diller</h3>
    ${eduHtml}
  `;

  /* ===== MAIN ===== */
  const expHtml = d.experience.map((exp, expIdx) => {
    if (exp.featured) {
      const stores = (exp.storeBadges||[]).map((s,i)=>{
        const last = i === exp.storeBadges.length-1;
        return `<a class="store-badge" href="${s.href}" target="_blank" rel="noopener">`
          + `<img src="${s.badge}" alt="${esc(s.label)}">` + (last ? clickIcon('stores') : "") + `</a>`;
      }).join("");
      const links = (exp.links||[]).map((l,i)=>linkBtn(l, i===exp.links.length-1, 'exp-'+expIdx)).join("");
      const featShots = (exp.shots||[]).map(s=>`<img src="${s}" alt="${esc(exp.name)}">`).join("");
      
      return `
        <div class="card feat">
          <div class="exp-top">
            <div>
              <span class="feat-badge">${esc(exp.featuredText || "Öne Çıkan")}</span>
              <div class="exp-name">${esc(exp.name)}</div>
              <div class="exp-role">${esc(exp.role)}</div>
            </div>
            <div><div class="exp-dates">${esc(exp.dates)}</div>${exp.note ? `<div class="exp-note">${esc(exp.note)}</div>` : ''}</div>
          </div>
          ${featShots ? `<div class="exp-shots">${featShots}</div>` : ""}
          ${exp.oneLine ? `<div class="exp-oneline">${esc(exp.oneLine)}</div>` : ""}
          <div class="btn-row">${stores}${links}</div>
          <ul class="bullets">${exp.bullets.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
        </div>`;
    } else {
      const links = (exp.links||[]).map((l,i)=>linkBtn(l, i===exp.links.length-1, 'simpleBalance')).join("");
      const sbFig = exp.image
        ? `<figure class="exp-figure"><img src="${exp.image}" alt="${esc(exp.name)}">`
          + (exp.imageCaption ? `<figcaption>${esc(exp.imageCaption)}</figcaption>` : "")
          + `</figure>`
        : "";
      return `
        <div class="card">
          <div class="exp-top">
            <div>
              <div class="exp-name">${esc(exp.name)}</div>
              <div class="exp-role">${esc(exp.role)}${exp.platform ? ` · ${esc(exp.platform)}` : ''}</div>
            </div>
            <div class="exp-dates">${esc(exp.dates)}</div>
          </div>
          ${sbFig}
          <ul class="bullets">${exp.bullets.map(b=>`<li>${esc(b)}</li>`).join("")}</ul>
          <div class="btn-row">${links}</div>
        </div>`;
    }
  }).join("");

  const projs = d.projects.map((p,pi)=>{
    const tags = p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const links = p.links.map((l,i)=>linkBtn(l, i===p.links.length-1, 'proj-'+pi)).join("");
    const datesHtml = p.dates ? `<div style="font-size:9px; font-weight:700; color:var(--muted); text-align:right; white-space:nowrap;">${esc(p.dates)}</div>` : "";
    return `
      <div class="proj">
        <img class="proj-img" src="${p.image}" alt="${esc(p.name)}">
        <div class="proj-body">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div class="proj-name">${esc(p.name)}</div>
            ${datesHtml}
          </div>
          <div class="proj-kind">${esc(p.kind)}</div>
          <div class="proj-tags">${tags}</div>
          <div class="proj-desc">${esc(p.desc)}</div>
          <div class="btn-row">${links}</div>
        </div>
      </div>`;
  }).join("");
  const fn = d.projectsFootnote;
  const fnLinks = fn.links.map((l,i)=>linkBtn(l, i===fn.links.length-1, 'footnote')).join("");
  const footnote = `<div class="footnote"><span>${esc(fn.text)}</span><div class="btn-row">${fnLinks}</div></div>`;

  const langBtn = !PdfExport ? `<div style="display:flex; justify-content:flex-end; margin-bottom:-10px; position:relative; z-index:10;"><a href="index.html" style="font-size:10px; color:var(--muted); border:1px solid var(--line); border-radius:4px; padding:3px 7px; background:#fff; text-decoration:none;">English</a></div>` : "";

  document.getElementById("main").innerHTML = `
    ${langBtn}
    <section>
      <div class="sec-head"><div class="num">1</div><h2>Profil</h2><div class="bar"></div></div>
      <div class="summary">${esc(d.summary)}</div>
    </section>

    <section>
      <div class="sec-head"><div class="num">2</div><h2>Deneyim</h2><div class="bar"></div></div>
      ${featHtml}
      ${sbHtml}
    </section>

    <section>
      <div class="sec-head"><div class="num">3</div><h2>Kişisel Projeler</h2><div class="bar"></div></div>
      <div class="proj-grid">${projs}${footnote}</div>
    </section>
  `;

  /* place ONE click icon on the last clickable skill chip and last clickable system */
  const schipLinks = document.querySelectorAll(".schip.link");
  if(schipLinks.length){ schipLinks[schipLinks.length-1].insertAdjacentHTML("beforeend", clickIcon('skills')); }
  const ssysLinks = document.querySelectorAll(".ssys a.it");
  if(ssysLinks.length){ ssysLinks[ssysLinks.length-1].insertAdjacentHTML("beforeend", clickIcon('systems')); }
}
render();
</script>
</body>
</html>
