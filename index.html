  .clickicon{position:absolute; right:0; bottom:0;
    width:var(--clickicon-size) !important; height:var(--clickicon-size) !important;
    transform:translate(

  .mini-h{font-size:10.5px; font-weight:700; color:var(--ink); margin-bottom:7px; text-transform:uppercase; letter-spacing:.04em;}

  @page{size:A4; margin:0;}
  @media print{
    body{background:#fff;}
    .page{margin:0; box-shadow:none; width:auto; min-height:auto;}
    .card,.proj{box-shadow:none;}
  }
</style>

/* ---------- render helpers ---------- */
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/&lt;b&gt;/g, "<b>").replace(/&lt;\/b&gt;/g, "</b>").replace(/&lt;a (.*?)&gt;/g, "<a $1>").replace(/&lt;\/a&gt;/g, "</a>");

/* ---------- click (tiklama) ikonlari ----------
   Boyut: :root --clickicon-size (TEK degisken, hepsi icin gecerli).
   Konum:
     - HEPSINI birden kaydirmak icin: :root --clickicon-offset-x / --clickicon-offset-y
     - SADECE bir ikonu kaydirmak icin: asagidaki ilgili anahtarin x/y'si (normalde 0,0). */
const CLICK_OFFSETS = {
  contact:       { x:0, y:0 },   // sidebar - iletisim
  stores:        { x:0, y:0 },   // CulturEnglish - magaza rozetleri
  simpleBalance: { x:0, y:0 },   // The Simple Balance - View on Steam
  footnote:      { x:0, y:0 },   // projeler dipnotu
  skills:        { x:0, y:0 },   // sidebar - yetenekler
  systems:       { x:0, y:0 },   // sidebar - sistemler
  "proj-0":{x:0,y:0}, "proj-1":{x:0,y:0}, "proj-2":{x:0,y:0}, "proj-3":{x:0,y:0},
  "proj-4":{x:0,y:0}, "proj-5":{x:0,y:0}, "proj-6":{x:0,y:0}, "proj-7":{x:0,y:0}
};
function clickIcon(key){
  const o = CLICK_OFFSETS[key] || { x:0, y:0 };
  return `<img class="clickicon" style="--clickicon-dx:${o.x}px; --clickicon-dy:${o.y}px" src="${DATA.clickIcon}" alt="">`;
}

function linkBtn(l, isLast, key){
  const badge = BADGE_BY_TYPE[l.type] || BADGE_BY_TYPE.web;
  const isSteam = l.type === "steam";
  const steam = isSteam ? " steam" : "";
  // Steam'de: "View On [STEAM svg]" - once yazi, sonra steam logosu.
  const inner = isSteam
    ? `<span>${esc(l.label)}</span><img src="${badge}" alt="Steam">`
    : `<img src="${badge}" alt=""><span>${esc(l.label)}</span>`;
  return `<a class="lbtn${steam}" href="${l.href}" target="_blank" rel="noopener">`
    + inner + (isLast ? clickIcon(key) : "") + `</a>`;
}

    return `<a class="sbtn" href="${c.href}" target="_blank" rel="noopener">${ic}`

  if(schipLinks.length){ schipLinks[schipLinks.length-1].insertAdjacentHTML("beforeend", clickIcon('skills')); }
  const ssysLinks = document.querySelectorAll(".ssys a.it");
  if(ssysLinks.length){ ssysLinks[ssysLinks.length-1].insertAdjacentHTML("beforeend", clickIcon('systems')); }
}
render();
</script>
